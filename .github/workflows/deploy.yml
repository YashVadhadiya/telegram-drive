name: Deploy Telegram Drive

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  deploy-frontend:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Deploy to Cloudflare Workers
        shell: bash
        run: |
          set -x
          echo "=== PWD ==="
          pwd
          echo "=== FILES ==="
          ls -la
          echo "=== BACKEND DIR ==="
          ls -la backend/ 2>&1 || echo "no backend dir"
          echo "=== WRANGLER.TOML ==="
          cat backend/wrangler.toml 2>&1 || echo "no wrangler.toml"
          echo "=== SRC ==="
          ls -la backend/src/ 2>&1 || echo "no src dir"
          echo "=== DEPLOY ==="
          cd backend
          npx --yes wrangler@4 deploy 2>&1
          echo "=== DONE ==="
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
